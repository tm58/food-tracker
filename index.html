<!DOCTYPE html>
<html>
<head>
  <title>Food Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Daily Food Log</h2>

<!-- Person 1 -->
<div class="card">
<h3>Person 1</h3>
<select id="meal1">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Snack</option>
</select>

<input type="text" id="food1" placeholder="What did they eat?">
<button onclick="addEntry('Person 1', 'meal1', 'food1')">Add</button>

</div>
<hr>

<!-- Person 2 -->
  <div class="card">
<h3>Person 2</h3>
<select id="meal2">
  <option>Breakfast</option>
  <option>Lunch</option>
  <option>Dinner</option>
  <option>Snack</option>
</select>

<input type="text" id="food2" placeholder="What did they eat?">
<button onclick="addEntry('Person 2', 'meal2', 'food2')">Add</button>
  </div>

<h3>Entries</h3>
<div id="list"></div>

<button id="loadHistory">Show History</button>

<script src="script.js"></script>

</body>
</html>
